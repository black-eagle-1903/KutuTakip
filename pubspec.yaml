name: kututakip
description: Personal house move inventory management app. Completely offline.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.4.0
  flutter: ^3.24.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.5.0

  # Database
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0

  # File & Permission
  path_provider: ^2.1.0
  permission_handler: ^11.4.0

  # Image & Camera
  image_picker: ^1.0.0
  photo_view: ^0.14.0
  flutter_image_compress: ^2.1.0

  # Share & File
  share_plus: ^7.2.0
  file_picker: ^6.1.0
  archive: ^3.4.0

  # Localization
  intl: ^0.19.0

  # UI
  google_fonts: ^6.1.0

  # Utilities
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.0
  drift_dev: ^2.14.0
  riverpod_generator: ^2.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/translations/
